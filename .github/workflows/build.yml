name: Build Native Android App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android App from Scratch
        run: |
          mkdir -p app/src/main/java/com/pouyachat/app
          
          # ساخت فایل‌های تنظیمات اندروید
          echo 'rootProject.name = "PouyaChat"' > settings.gradle
          echo 'include(":app")' >> settings.gradle
          echo 'plugins { id("com.android.application") version "8.2.0" apply false; id("org.jetbrains.kotlin.android") version "1.9.0" apply false }' > build.gradle
          
          cat << 'EOF' > app/build.gradle
          plugins { id("com.android.application"); id("org.jetbrains.kotlin.android") }
          android {
              namespace = "com.pouyachat.app"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.pouyachat.app"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              compileOptions { sourceCompatibility = JavaVersion.VERSION_1_8; targetCompatibility = JavaVersion.VERSION_1_8 }
              kotlinOptions { jvmTarget = "1.8" }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
          }
          EOF
          
          # ساخت شناسنامه اندروید
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:label="Pouya Chat"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # ساخت هسته کاتلین و اتصال به چت‌روم
          cat << 'EOF' > app/src/main/java/com/pouyachat/app/MainActivity.kt
          package com.pouyachat.app
          import android.annotation.SuppressLint
          import android.os.Bundle
          import android.webkit.WebChromeClient
          import android.webkit.WebView
          import android.webkit.WebViewClient
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              @SuppressLint("SetJavaScriptEnabled")
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  webView = WebView(this)
                  setContentView(webView)
                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      databaseEnabled = true
                  }
                  webView.webViewClient = WebViewClient()
                  webView.webChromeClient = WebChromeClient()
                  
                  // آدرس سایت شما
                  webView.loadUrl("https://chat.pouyamweb.click")
              }
              @Deprecated("Deprecated in Java")
              override fun onBackPressed() {
                  if (webView.canGoBack()) webView.goBack() else super.onBackPressed()
              }
          }
          EOF
          
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          
          # کامپایل کردن اپلیکیشن
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PouyaChat-APK
          path: app/build/outputs/apk/debug/app-debug.apk
